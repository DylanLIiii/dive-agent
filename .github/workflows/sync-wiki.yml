name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/learns/**/*.md'
      - 'docs/best-choices/**/*.md'

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync learning notes to wiki
        run: |
          # Create wiki directory structure
          mkdir -p wiki/learns
          mkdir -p wiki/best-choices
          mkdir -p wiki/tags

          # Sync learning notes (flatten subdirectories)
          if [ -d "docs/learns" ]; then
            find docs/learns -name "*.md" -type f | while read file; do
              cp "$file" wiki/learns/
            done
          fi

          # Sync best-choices
          if [ -d "docs/best-choices" ]; then
            find docs/best-choices -name "*.md" -type f | while read file; do
              cp "$file" wiki/best-choices/
            done
          fi

      - name: Generate Tag Pages
        run: |
          # Extract tags from all docs and build tag index
          declare -A tag_docs
          
          # Process learning notes
          if [ -d "docs/learns" ]; then
            find docs/learns -name "*.md" -type f | while read file; do
              filename=$(basename "$file")
              # Extract tags from YAML frontmatter
              tags=$(sed -n '/^---$/,/^---$/p' "$file" | grep -E '^tags:' | sed 's/tags://' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$')
              if [ -n "$tags" ]; then
                echo "$filename|learns|$tags" >> /tmp/doc_tags.txt
              fi
            done
          fi
          
          # Process best-choices
          if [ -d "docs/best-choices" ]; then
            find docs/best-choices -name "*.md" -type f | while read file; do
              filename=$(basename "$file")
              # Extract tags from YAML frontmatter
              tags=$(sed -n '/^---$/,/^---$/p' "$file" | grep -E '^tags:' | sed 's/tags://' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$')
              if [ -n "$tags" ]; then
                echo "$filename|best-choices|$tags" >> /tmp/doc_tags.txt
              fi
            done
          fi
          
          # Build tag index
          if [ -f /tmp/doc_tags.txt ]; then
            while IFS='|' read -r filename folder tags; do
              for tag in $tags; do
                echo "$filename|$folder" >> "/tmp/tag_${tag}.txt"
              done
            done < /tmp/doc_tags.txt
          fi
          
          # Generate tag pages
          for tag_file in /tmp/tag_*.txt; do
            if [ -f "$tag_file" ]; then
              tag=$(basename "$tag_file" | sed 's/tag_//' | sed 's/.txt$//')
              cat > "wiki/tags/${tag}.md" << EOF
          # Tag: ${tag}

          包含标签 **#${tag}** 的所有文档。

          ## 学习笔记

          EOF
              grep '|learns|' "$tag_file" | while IFS='|' read -r doc folder; do
                name="${doc%.md}"
                echo "- [${name}](../learns/${doc})" >> "wiki/tags/${tag}.md"
              done
              
              echo "" >> "wiki/tags/${tag}.md"
              echo "## 最佳实践" >> "wiki/tags/${tag}.md"
              echo "" >> "wiki/tags/${tag}.md"
              
              grep '|best-choices|' "$tag_file" | while IFS='|' read -r doc folder; do
                name="${doc%.md}"
                echo "- [${name}](../best-choices/${doc})" >> "wiki/tags/${tag}.md"
              done
            fi
          done
          
          # Generate Tags index page
          cat > wiki/Tags.md << 'EOF'
          # 标签索引

          按标签浏览所有文档。

          ## 所有标签

          EOF
          
          if ls /tmp/tag_*.txt 1> /dev/null 2>&1; then
            for tag_file in /tmp/tag_*.txt; do
              tag=$(basename "$tag_file" | sed 's/tag_//' | sed 's/.txt$//')
              count=$(wc -l < "$tag_file" | tr -d ' ')
              echo "- [#${tag}](./${tag}) (${count})" >> wiki/Tags.md
            done | sort
          fi
          
          echo "" >> wiki/Tags.md
          echo "---" >> wiki/Tags.md
          echo "*点击标签查看相关文档*" >> wiki/Tags.md

      - name: Generate Home page
        run: |
          cat > wiki/Home.md << 'EOF'
          # Agent Group 知识库 Wiki

          欢迎访问 Agent Group Wiki！本 Wiki 自动同步自 [主仓库](${{ github.server_url }}/${{ github.repository }})。

          ## 标签云

          EOF
          
          # Collect all tags
          all_tags=""
          if ls /tmp/tag_*.txt 1> /dev/null 2>&1; then
            for tag_file in /tmp/tag_*.txt; do
              tag=$(basename "$tag_file" | sed 's/tag_//' | sed 's/.txt$//')
              count=$(wc -l < "$tag_file" | tr -d ' ')
              all_tags="${all_tags} ${tag}|${count}"
            done
          fi
          
          # Sort tags by count (descending) and display
          if [ -n "$all_tags" ]; then
            echo "按标签浏览文档：" >> wiki/Home.md
            echo "" >> wiki/Home.md
            echo "| 标签 | 文档数 |" >> wiki/Home.md
            echo "|------|--------|" >> wiki/Home.md
            for tag_info in $all_tags; do
              tag=$(echo "$tag_info" | cut -d'|' -f1)
              count=$(echo "$tag_info" | cut -d'|' -f2)
              echo "| [#${tag}](./tags/${tag}) | ${count} |" >> wiki/Home.md
            done | sort -t'|' -k3 -nr
          else
            echo "暂无标签" >> wiki/Home.md
          fi
          
          cat >> wiki/Home.md << 'EOF'

          ## 学习笔记

          EOF

          # Add links to all learning notes
          if [ -d "docs/learns" ]; then
            find docs/learns -name "*.md" -type f | sort | while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              # Extract tags for this file
              tags=$(sed -n '/^---$/,/^---$/p' "$file" | grep -E '^tags:' | sed 's/tags://' | tr ',' ' ' | sed 's/^ *//;s/ *$//')
              if [ -n "$tags" ]; then
                tag_links=""
                for tag in $tags; do
                  tag_links="${tag_links} [#${tag}](./tags/${tag})"
                done
                echo "- [${name}](./learns/${filename})${tag_links}" >> wiki/Home.md
              else
                echo "- [${name}](./learns/${filename})" >> wiki/Home.md
              fi
            done
          fi

          cat >> wiki/Home.md << 'EOF'

          ## 最佳实践

          EOF

          if [ -d "docs/best-choices" ]; then
            find docs/best-choices -name "*.md" -type f | sort | while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              # Extract tags for this file
              tags=$(sed -n '/^---$/,/^---$/p' "$file" | grep -E '^tags:' | sed 's/tags://' | tr ',' ' ' | sed 's/^ *//;s/ *$//')
              if [ -n "$tags" ]; then
                tag_links=""
                for tag in $tags; do
                  tag_links="${tag_links} [#${tag}](./tags/${tag})"
                done
                echo "- [${name}](./best-choices/${filename})${tag_links}" >> wiki/Home.md
              else
                echo "- [${name}](./best-choices/${filename})" >> wiki/Home.md
              fi
            done
          fi

          echo "" >> wiki/Home.md
          echo "---" >> wiki/Home.md
          echo "*最后同步：$(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> wiki/Home.md

      - name: Generate Sidebar
        run: |
          cat > wiki/_Sidebar.md << 'EOF'
          ## 导航

          **[首页](./Home)**
          **[标签索引](./Tags)**

          ### 学习笔记

          EOF

          if [ -d "docs/learns" ]; then
            find docs/learns -name "*.md" -type f | sort | while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              echo "- [${name}](./learns/${filename})" >> wiki/_Sidebar.md
            done
          fi

          cat >> wiki/_Sidebar.md << 'EOF'

          ### 最佳实践

          EOF

          if [ -d "docs/best-choices" ]; then
            find docs/best-choices -name "*.md" -type f | sort | while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              echo "- [${name}](./best-choices/${filename})" >> wiki/_Sidebar.md
            done
          fi
          
          cat >> wiki/_Sidebar.md << 'EOF'

          ### 按标签浏览

          EOF
          
          if ls /tmp/tag_*.txt 1> /dev/null 2>&1; then
            for tag_file in /tmp/tag_*.txt; do
              tag=$(basename "$tag_file" | sed 's/tag_//' | sed 's/.txt$//')
              echo "- [#${tag}](./tags/${tag})" >> wiki/_Sidebar.md
            done | sort
          fi

      - name: Commit and push wiki
        run: |
          cd wiki
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync from main repo: $(date -u '+%Y-%m-%d %H:%M')"
          git push origin master || git push origin main
