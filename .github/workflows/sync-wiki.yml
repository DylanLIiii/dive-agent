name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/learns/**/*.md'
      - 'docs/best-choices/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync learning notes to wiki
        run: |
          # Create wiki directory structure
          mkdir -p wiki/learns
          mkdir -p wiki/best-choices

          # Sync learning notes (flatten subdirectories)
          if [ -d "docs/learns" ]; then
            find docs/learns -name "*.md" -type f | while read file; do
              cp "$file" wiki/learns/
            done
          fi

          # Sync best-choices
          if [ -d "docs/best-choices" ]; then
            find docs/best-choices -name "*.md" -type f | while read file; do
              cp "$file" wiki/best-choices/
            done
          fi

      - name: Generate Home page
        run: |
          cat > wiki/Home.md << EOF
          # Agent Group 知识库 Wiki

          欢迎访问 Agent Group Wiki！本 Wiki 自动同步自 [主仓库](${{ github.server_url }}/${{ github.repository }})。

          ## 学习笔记

          EOF

          # Add links to all learning notes (excluding README.md)
          if [ -d "docs/learns" ]; then
            while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              echo "- [${name}](./learns/${name})" >> wiki/Home.md
            done < <(find docs/learns -name "*.md" ! -name "README.md" -type f | sort)
          fi

          cat >> wiki/Home.md << 'EOF'

          ## 最佳实践

          EOF

          if [ -d "docs/best-choices" ]; then
            while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              echo "- [${name}](./best-choices/${name})" >> wiki/Home.md
            done < <(find docs/best-choices -name "*.md" ! -name "README.md" -type f | sort)
          fi

          echo "" >> wiki/Home.md
          echo "---" >> wiki/Home.md
          echo "*最后同步：$(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> wiki/Home.md

      - name: Generate Sidebar
        run: |
          cat > wiki/_Sidebar.md << 'EOF'
          ## 导航

          **[首页](./Home)**

          ### 学习笔记

          EOF

          # 递归处理 learns 目录，过滤 README.md
          process_learns_dir() {
            local dir="$1"
            local indent="$2"
            
            # 获取当前目录下所有子目录（按字母排序）
            find "$dir" -mindepth 1 -maxdepth 1 -type d | sort | while read subdir; do
              local dirname=$(basename "$subdir")
              
              # 检查该目录下是否有非 README 的 md 文件
              local has_content=$(find "$subdir" -name "*.md" ! -name "README.md" -type f | head -1)
              
              if [ -n "$has_content" ]; then
                # 目录标题
                echo "${indent}**${dirname}**" >> wiki/_Sidebar.md
                
                # 该目录下的 md 文件（排除 README）
                find "$subdir" -maxdepth 1 -name "*.md" ! -name "README.md" -type f | sort | while read file; do
                  filename=$(basename "$file")
                  name="${filename%.md}"
                  echo "${indent}- [${name}](./learns/${name})" >> wiki/_Sidebar.md
                done
                
                # 递归处理子目录
                process_learns_dir "$subdir" "${indent}  "
              fi
            done
          }

          if [ -d "docs/learns" ]; then
            process_learns_dir "docs/learns" ""
          fi

          cat >> wiki/_Sidebar.md << 'EOF'

          ### 最佳实践

          EOF

          if [ -d "docs/best-choices" ]; then
            # 只包含非 README 的 md 文件
            find docs/best-choices -maxdepth 1 -name "*.md" ! -name "README.md" -type f | sort | while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              echo "- [${name}](./best-choices/${name})" >> wiki/_Sidebar.md
            done
          fi

      - name: Commit and push wiki
        run: |
          cd wiki
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync from main repo: $(date -u '+%Y-%m-%d %H:%M')"
          git push origin master || git push origin main
